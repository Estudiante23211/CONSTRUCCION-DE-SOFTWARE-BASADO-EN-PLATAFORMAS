<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2>¿Olvidé mi contraseña?</h2>
      <p>
        Ingresa el <strong>correo registrado</strong> al momento de crear tu cuenta.
      </p>
    </div>

    <form (ngSubmit)="continuar()">
      <div class="mb-3">
        <label for="email" class="form-label">Correo electrónico</label>
        <input
          id="email"
          type="email"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          placeholder="correo@ejemplo.com"
          autocomplete="email"
          [class.is-invalid]="emailInvalid"
          [disabled]="loading" />
        @if (emailInvalid) {
          <div class="invalid-feedback">
            Ingresa un correo válido.
          </div>
        }
      </div>

      @if (error) {
        <div class="alert alert-danger">{{ error }}</div>
      }

      <div class="d-flex gap-2">
        <button type="button" class="btn btn-outline-secondary w-50" (click)="volverLogin()" [disabled]="loading">
          Volver
        </button>
        <button type="submit" class="btn btn-primary w-50 auth-btn-primary" [disabled]="loading">
          @if (loading) {
            <span class="spinner-border spinner-border-sm me-2" aria-hidden="true"></span>
          }
          Continuar
        </button>
      </div>
    </form>
  </div>
</div>
