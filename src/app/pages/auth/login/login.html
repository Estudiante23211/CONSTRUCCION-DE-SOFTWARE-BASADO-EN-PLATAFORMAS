<div class="login-wrapper">

  <!-- Columna izquierda: Branding -->
  <div class="login-brand">
    <img src="assets/images/logo_Kalsan.png" alt="Kalsan's" class="login-logo">
    <h1 class="login-brand-title">KALSAN'S</h1>
    <p class="login-brand-subtitle">Sistema de Gestión Empresarial</p>
    <p class="login-brand-desc">Gestiona pedidos, clientes, inventarios y más desde una plataforma centralizada.</p>
  </div>

  <!-- Columna derecha: Formulario -->
  <div class="login-form-section">
    <div class="login-form-box">
      <h2 class="login-title" style="text-align: center;">Iniciar Sesión</h2>
      <br>

      <form (ngSubmit)="iniciarSesion()" class="login-form">
        <div class="form-group">
          <label for="email">Nombre de usuario o Email</label>
          <input type="email"
            id="email"
            placeholder="correo@ejemplo.com"
            [(ngModel)]="email"
            name="email"
            class="form-control">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="password-wrapper">
            <input [type]="showPassword ? 'text' : 'password'"
              id="password"
              placeholder="••••••••"
              [(ngModel)]="password"
              name="password"
              class="form-control">
            <button type="button"
              class="password-toggle"
              (click)="showPassword = !showPassword"
              [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
              <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
            </button>
          </div>
        </div>

        <div class="forgot-password">
          <a href="#" class="forgot-link">Olvidé mi contraseña</a>
        </div>

        @if (error) {
          <div class="alert alert-danger">
            {{ error }}
          </div>
        }

        <button type="submit" class="btn-login">
          Iniciar Sesión
        </button>
      </form>
    </div>
  </div>

</div>
