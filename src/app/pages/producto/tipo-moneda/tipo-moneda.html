<main class="container-fluid py-4">

    <h2 class="mb-4 fw-bold">{{ tituloModulo }}</h2>
  
    <!-- ================= FILTROS ================= -->
    <div class="card shadow-sm mb-4 filtro-card">
      <div class="card-body">
  
        <h6 class="mb-3 text-muted">
          <i class="bi bi-funnel me-2"></i>Filtros de búsqueda
        </h6>
  
        <div class="row g-3">
  
          <div class="col-md-4">
            <label class="form-label small">Nombre</label>
            <input type="text"
                   class="form-control form-control-sm"
                   [(ngModel)]="filtroNombre">
          </div>
  
          <div class="col-md-4">
            <label class="form-label small">Estado</label>
            <select class="form-select form-select-sm"
                    [(ngModel)]="filtroEstado">
              <option value="">Todos</option>
              <option value="Activo">Activo</option>
              <option value="Inactivo">Inactivo</option>
            </select>
          </div>
  
          <div class="col-md-4">
            <label class="form-label small">Fecha Creación</label>
            <input type="date"
                   class="form-control form-control-sm"
                   [(ngModel)]="filtroFecha">
          </div>
  
        </div>
      </div>
    </div>
  
    <!-- ================= LISTADO ================= -->
    <div class="card shadow-sm">
      <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Listado de Tipos de Moneda</h5>
        <button class="btn btn-primary" (click)="abrirNuevo()">
          <i class="bi bi-plus-lg me-2"></i>Nuevo
        </button>
      </div>
  
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Nombre</th>
              <th>Descripción</th>
              <th>Estado</th>
              <th>Usuario</th>
              <th>Fecha</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
  
          <tbody>
            @for (t of listaFiltrada; track t.id) {
            <tr>
              <td>{{ t.nombre }}</td>
              <td>{{ t.descripcion }}</td>
              <td>
                <span class="badge"
                  [class.bg-success]="t.estado === 'Activo'"
                  [class.bg-danger]="t.estado === 'Inactivo'">
                  {{ t.estado }}
                </span>
              </td>
              <td>{{ t.usuarioCreacion }}</td>
              <td>{{ t.fechaCreacion }}</td>
  
              <td class="text-center">
                <div class="acciones-container">
                  <button class="btn btn-sm btn-outline-primary"
                          (click)="abrirEditar(t)">
                    <i class="bi bi-pencil"></i>
                  </button>
  
                  <button class="btn btn-sm"
                          [class.btn-outline-danger]="t.estado === 'Activo'"
                          [class.btn-outline-success]="t.estado === 'Inactivo'"
                          (click)="cambiarEstado(t)">
                    <i class="bi"
                       [class.bi-toggle-off]="t.estado === 'Activo'"
                       [class.bi-toggle-on]="t.estado === 'Inactivo'"></i>
                  </button>
                </div>
              </td>
            </tr>
            } @empty {
            <tr>
              <td colspan="6" class="text-center py-4 text-muted">
                No hay registros
              </td>
            </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  
    <!-- BOTON OCULTO -->
    <button #btnModal class="d-none"
            data-bs-toggle="modal"
            data-bs-target="#modalTipoMoneda"></button>
  
    <!-- ================= MODAL ================= -->
    <div class="modal fade" id="modalTipoMoneda" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
  
          <div class="modal-header modal-header-custom">
            <h5 class="modal-title text-white">
              {{ modalTitulo }}
            </h5>
            <button type="button"
                    class="btn-close btn-close-white"
                    data-bs-dismiss="modal"></button>
          </div>
  
          <div class="modal-body">
  
            <div class="mb-3">
              <label class="form-label fw-semibold">
                Nombre *
              </label>
              <input type="text"
                     class="form-control"
                     [(ngModel)]="form.nombre">
            </div>
  
            <div class="mb-3">
              <label class="form-label fw-semibold">
                Descripción
              </label>
              <textarea class="form-control"
                        rows="3"
                        [(ngModel)]="form.descripcion"></textarea>
            </div>
  
          </div>
  
          <div class="modal-footer justify-content-center">
            <button class="btn btn-primary px-4"
                    (click)="guardar()">
              Guardar
            </button>
            <button class="btn btn-outline-danger px-4"
                    data-bs-dismiss="modal">
              Cancelar
            </button>
          </div>
  
        </div>
      </div>
    </div>
  
  </main>
